<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - AI 智能助手</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide-up { animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .pulse-glow { animation: pulseGlow 2s ease-in-out infinite; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 20px rgba(99, 102, 241, 0.3); } 50% { box-shadow: 0 0 40px rgba(99, 102, 241, 0.6); } }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .gradient-text { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .glass-effect { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4); }
        .input-focus:focus { box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2); }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-100 min-h-screen flex items-center justify-center">
    <div id="app" class="w-full flex items-center justify-center min-h-screen">
        <div class="glass-effect p-10 rounded-3xl shadow-2xl w-[420px] slide-up">
            <div class="text-center mb-8">
                <div class="w-16 h-16 mx-auto mb-4 rounded-2xl gradient-bg flex items-center justify-center pulse-glow">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
                    </svg>
                </div>
                <h2 class="text-3xl font-bold gradient-text">{{ isLoginView ? '欢迎回来' : '创建账户' }}</h2>
                <p class="text-slate-500 mt-2 text-sm">{{ isLoginView ? '登录以继续使用AI助手' : '注册一个新账户开始使用' }}</p>
            </div>

            <div class="space-y-5">
                <div class="relative">
                    <input v-model="authForm.username" type="text" placeholder="用户名"
                           class="w-full bg-slate-50 border-2 border-slate-200 p-4 rounded-2xl focus:border-indigo-500 outline-none input-focus transition-all pl-12">
                    <svg class="w-5 h-5 text-slate-400 absolute left-4 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                </div>

                <div class="relative">
                    <input v-model="authForm.password" @keyup.enter="handleAuth" type="password" placeholder="密码"
                           class="w-full bg-slate-50 border-2 border-slate-200 p-4 rounded-2xl focus:border-indigo-500 outline-none input-focus transition-all pl-12">
                    <svg class="w-5 h-5 text-slate-400 absolute left-4 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                    </svg>
                </div>

                <div class="flex items-center justify-between" v-if="isLoginView">
                    <label class="flex items-center cursor-pointer">
                        <input type="checkbox" v-model="rememberMe" class="w-4 h-4 text-indigo-600 rounded border-slate-300 focus:ring-indigo-500">
                        <span class="ml-2 text-sm text-slate-600">记住我</span>
                    </label>
                </div>

                <button @click="handleAuth" :disabled="loading"
                        class="w-full btn-primary text-white py-4 rounded-2xl font-semibold disabled:opacity-50 disabled:transform-none flex items-center justify-center gap-2">
                    <div v-if="loading" class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                    <span v-else>{{ isLoginView ? '登录' : '注册' }}</span>
                </button>
            </div>

            <p @click="isLoginView = !isLoginView" class="text-center text-sm text-slate-500 mt-6 cursor-pointer hover:text-indigo-600 transition-colors">
                {{ isLoginView ? '没有账号？立即注册' : '已有账号？立即登录' }}
            </p>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;
        const API_BASE = "http://localhost:8000";
        axios.defaults.withCredentials = true;

        createApp({
            setup() {
                const isLoginView = ref(true);
                const loading = ref(false);
                const rememberMe = ref(true);
                const authForm = ref({ username: '', password: '' });
                const errorMsg = ref('');

                const handleAuth = async () => {
                    errorMsg.value = '';
                    const url = isLoginView.value ? "/auth/login" : "/auth/register";
                    loading.value = true;
                    try {
                        await axios.post(`${API_BASE}${url}?username=${authForm.value.username}&password=${authForm.value.password}`);
                        if (isLoginView.value) {
                            if (rememberMe.value) {
                                localStorage.setItem('isLoggedIn', 'true');
                                localStorage.setItem('username', authForm.value.username);
                            }
                            window.location.href = '/html/chat.html';
                        } else {
                            isLoginView.value = true;
                            alert('注册成功，请登录');
                        }
                    } catch (e) {
                        errorMsg.value = e.response?.data?.detail || '操作失败';
                        alert(errorMsg.value);
                    } finally {
                        loading.value = false;
                    }
                };

                onMounted(async () => {
                    // 检查是否已登录
                    try {
                        await axios.get(`${API_BASE}/auth/me`);
                        // 已登录，跳转到聊天页
                        window.location.href = '/html/chat.html';
                        return;
                    } catch (e) {
                        // 未登录，留在登录页
                    }
                    const saved = localStorage.getItem('isLoggedIn');
                    const savedUser = localStorage.getItem('username');
                    if (saved === 'true' && savedUser) {
                        authForm.value.username = savedUser;
                    }
                });

                return { isLoginView, loading, rememberMe, authForm, errorMsg, handleAuth };
            }
        }).mount('#app');
    </script>
</body>
</html>
