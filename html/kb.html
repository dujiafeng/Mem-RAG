<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能助手 - 知识库</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #6366f1, #8b5cf6); border-radius: 10px; }
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide-up { animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .gradient-text { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .glass-effect { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4); }
        .btn-success { background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); transition: all 0.3s ease; }
        .btn-success:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(34, 197, 94, 0.4); }
        .input-focus:focus { box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2); }
        .kb-file-item { transition: all 0.2s ease; }
        .kb-file-item:hover { transform: translateX(5px); }
        .upload-zone { border: 2px dashed #cbd5e1; transition: all 0.3s ease; }
        .upload-zone:hover { border-color: #6366f1; background: #f8fafc; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-100 min-h-screen">
    <div id="app" class="h-screen flex overflow-hidden">

        <!-- 侧边栏 -->
        <aside class="w-80 bg-white/80 backdrop-blur-xl border-r border-slate-200/50 flex flex-col shadow-xl">
            <div class="p-6 border-b border-slate-200/50">
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl gradient-bg flex items-center justify-center">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                            </svg>
                        </div>
                        <span class="font-bold text-xl gradient-text">知识库</span>
                    </div>
                    <div class="flex gap-1">
                        <button onclick="window.location.href='/html/chat.html'" class="p-2 rounded-lg text-slate-400 hover:bg-slate-100 transition-all" title="对话">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
                            </svg>
                        </button>
                        <button class="p-2 rounded-lg bg-indigo-100 text-indigo-600" title="知识库">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- 导航 -->
            <div class="flex-1 overflow-y-auto custom-scroll p-4 space-y-3">
                <button @click="kbTab = 'my'" :class="['w-full p-3 rounded-2xl text-left flex items-center gap-3 transition-all', kbTab === 'my' ? 'bg-gradient-to-r from-indigo-500 to-purple-500 text-white shadow-lg' : 'bg-slate-50 hover:bg-slate-100 text-slate-700']">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                    <div><div class="font-medium text-sm">我的文件</div><div class="text-xs opacity-70">管理上传的知识库</div></div>
                </button>
                <button @click="kbTab = 'shared'" :class="['w-full p-3 rounded-2xl text-left flex items-center gap-3 transition-all', kbTab === 'shared' ? 'bg-gradient-to-r from-indigo-500 to-purple-500 text-white shadow-lg' : 'bg-slate-50 hover:bg-slate-100 text-slate-700']">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
                    </svg>
                    <div><div class="font-medium text-sm">公共知识库</div><div class="text-xs opacity-70">查看共享文件</div></div>
                </button>
            </div>

            <!-- 用户信息 -->
            <div class="p-4 border-t border-slate-200/50">
                <div class="bg-slate-50 rounded-2xl p-4 flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-400 to-purple-500 flex items-center justify-center text-white font-bold">{{ username ? username[0].toUpperCase() : 'U' }}</div>
                        <span class="font-medium text-slate-700">{{ username }}</span>
                    </div>
                    <button onclick="handleLogout()" class="p-2 rounded-xl hover:bg-red-50 text-slate-400 hover:text-red-500 transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                        </svg>
                    </button>
                </div>
            </div>
        </aside>

        <!-- 主内容 -->
        <main class="flex-1 flex flex-col bg-transparent">

            <!-- 我的文件 -->
            <template v-if="kbTab === 'my'">
                <div class="flex-1 overflow-y-auto p-8 custom-scroll">
                    <div class="max-w-4xl mx-auto space-y-6">
                        <!-- 上传区域 -->
                        <div class="bg-white rounded-3xl shadow-xl border border-slate-200/50 p-8">
                            <h3 class="text-xl font-bold gradient-text mb-6">上传知识库文件</h3>
                            <div class="upload-zone rounded-2xl p-8 text-center" @dragover.prevent @drop.prevent="handleFileDrop">
                                <svg class="w-16 h-16 mx-auto text-indigo-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                                </svg>
                                <p class="text-slate-500 mb-2">拖拽文件到此处，或 <label class="text-indigo-600 cursor-pointer hover:text-indigo-700">点击选择文件<input type="file" accept=".txt,.pdf,.docx,.doc,.pptx,.xlsx" @change="handleFileSelect" class="hidden"></label></p>
                                <p class="text-xs text-slate-400">支持 txt / pdf / docx / pptx / xlsx 格式</p>
                            </div>

                            <div v-if="selectedFile" class="mt-4 p-4 bg-slate-50 rounded-2xl">
                                <div class="flex items-center justify-between">
                                    <div class="flex items-center gap-3">
                                        <svg class="w-8 h-8 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                                        </svg>
                                        <div>
                                            <p class="font-medium text-slate-700">{{ selectedFile.name }}</p>
                                            <p class="text-xs text-slate-400">{{ (selectedFile.size / 1024).toFixed(1) }} KB</p>
                                        </div>
                                    </div>
                                    <button @click="selectedFile = null" class="p-2 rounded-lg hover:bg-red-50 text-slate-400 hover:text-red-500">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                                        </svg>
                                    </button>
                                </div>
                                <div class="mt-3 flex items-center gap-4">
                                    <label class="flex items-center cursor-pointer">
                                        <input type="checkbox" v-model="uploadShared" class="w-4 h-4 text-indigo-600 rounded border-slate-300 focus:ring-indigo-500">
                                        <span class="ml-2 text-sm text-slate-600">分享到公共知识库</span>
                                    </label>
                                    <button @click="handleUpload" :disabled="uploading" class="btn-success text-white px-6 py-2 rounded-xl font-medium disabled:opacity-50 flex items-center gap-2">
                                        <div v-if="uploading" class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                                        <span>{{ uploading ? '上传中...' : '上传' }}</span>
                                    </button>
                                </div>
                            </div>

                            <div v-if="uploadResult" :class="['mt-4 p-4 rounded-2xl text-sm', uploadResult.isSuccess ? 'bg-green-50 text-green-700' : 'bg-yellow-50 text-yellow-700']">{{ uploadResult.message }}</div>
                        </div>

                        <!-- 文件列表 -->
                        <div class="bg-white rounded-3xl shadow-xl border border-slate-200/50 p-8">
                            <h3 class="text-xl font-bold gradient-text mb-6">我的文件 ({{ myFiles.length }})</h3>
                            <div v-if="myFiles.length === 0" class="text-center py-10 text-slate-400">
                                <svg class="w-12 h-12 mx-auto mb-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                                </svg>
                                <p class="text-sm">还没有上传任何文件</p>
                            </div>
                            <div v-for="file in myFiles" :key="file.id" class="kb-file-item p-4 rounded-2xl bg-slate-50 mb-3 hover:bg-slate-100 transition-all">
                                <div class="flex items-center justify-between">
                                    <div class="flex items-center gap-3 flex-1">
                                        <svg class="w-8 h-8 text-indigo-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                                        </svg>
                                        <div class="flex-1 min-w-0">
                                            <p class="font-medium text-slate-700 truncate">{{ file.filename }}</p>
                                            <p class="text-xs text-slate-400">{{ file.create_time }} · {{ file.chunk_count }} 个片段 <span v-if="file.is_shared" class="text-green-500 ml-2">🌐 已共享</span></p>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-2 flex-shrink-0">
                                        <button @click="handlePreview(file)" class="px-3 py-1.5 rounded-xl text-xs font-medium bg-indigo-50 text-indigo-600 hover:bg-indigo-100 transition-all">预览</button>
                                        <button @click="handleToggleShare(file.id)" :class="['px-3 py-1.5 rounded-xl text-xs font-medium transition-all', file.is_shared ? 'bg-green-100 text-green-700 hover:bg-green-200' : 'bg-slate-200 text-slate-600 hover:bg-slate-300']">{{ file.is_shared ? '取消共享' : '共享' }}</button>
                                        <button @click="handleDeleteFile(file.id)" class="px-3 py-1.5 rounded-xl text-xs font-medium bg-red-50 text-red-600 hover:bg-red-100 transition-all">删除</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </template>

            <!-- 公共知识库 -->
            <template v-if="kbTab === 'shared'">
                <div class="flex-1 overflow-y-auto p-8 custom-scroll">
                    <div class="max-w-4xl mx-auto">
                        <div class="bg-white rounded-3xl shadow-xl border border-slate-200/50 p-8">
                            <h3 class="text-xl font-bold gradient-text mb-6">公共知识库</h3>
                            <p class="text-slate-500 text-sm mb-6">其他用户共享的知识库文件，每个人都可以查看和使用</p>
                            <div v-if="sharedFiles.length === 0" class="text-center py-10 text-slate-400">
                                <svg class="w-12 h-12 mx-auto mb-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
                                </svg>
                                <p class="text-sm">暂无共享文件</p>
                            </div>
                            <div v-for="file in sharedFiles" :key="file.id" class="kb-file-item p-4 rounded-2xl bg-slate-50 mb-3 hover:bg-slate-100 transition-all">
                                <div class="flex items-center gap-3">
                                    <svg class="w-8 h-8 text-green-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                                    </svg>
                                    <div class="flex-1 min-w-0">
                                        <p class="font-medium text-slate-700 truncate">{{ file.filename }}</p>
                                        <p class="text-xs text-slate-400">上传者: {{ file.username }} · {{ file.create_time }} · {{ file.chunk_count }} 个片段</p>
                                    </div>
                                    <button @click="handlePreview(file)" class="px-3 py-1.5 rounded-xl text-xs font-medium bg-indigo-50 text-indigo-600 hover:bg-indigo-100 transition-all flex-shrink-0">预览</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </template>

        </main>

        <!-- 文件预览弹窗 -->
        <div v-if="showPreview" class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-8" @click.self="showPreview = false">
            <div class="bg-white rounded-3xl shadow-2xl w-full max-w-3xl max-h-[80vh] flex flex-col slide-up">
                <div class="flex items-center justify-between p-6 border-b border-slate-200">
                    <div class="flex items-center gap-3">
                        <svg class="w-6 h-6 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                        </svg>
                        <h3 class="font-bold text-lg text-slate-700">{{ previewFile.filename }}</h3>
                        <span class="text-xs text-slate-400 bg-slate-100 px-2 py-1 rounded-lg">{{ previewFile.total_chars }} 字符</span>
                    </div>
                    <button @click="showPreview = false" class="p-2 rounded-xl hover:bg-slate-100 text-slate-400 hover:text-slate-600 transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <div class="flex-1 overflow-y-auto p-6 custom-scroll">
                    <div v-if="previewLoading" class="flex items-center justify-center py-12">
                        <div class="w-8 h-8 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                    </div>
                    <pre v-else class="whitespace-pre-wrap text-sm text-slate-700 font-sans leading-relaxed">{{ previewFile.content }}</pre>
                </div>
                <div class="p-4 border-t border-slate-200 flex justify-end">
                    <button @click="showPreview = false" class="px-6 py-2 rounded-xl bg-slate-100 text-slate-600 hover:bg-slate-200 font-medium transition-all">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;
        const API_BASE = "http://localhost:8000";
        axios.defaults.withCredentials = true;

        function handleLogout() {
            document.cookie = "session_id=; Max-Age=0; path=/;";
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('username');
            window.location.href = '/html/login.html';
        }

        createApp({
            setup() {
                const kbTab = ref('my');
                const username = ref('');
                const myFiles = ref([]);
                const sharedFiles = ref([]);
                const selectedFile = ref(null);
                const uploadShared = ref(false);
                const uploading = ref(false);
                const uploadResult = ref(null);
                const showPreview = ref(false);
                const previewFile = ref({ filename: '', content: '', total_chars: 0 });
                const previewLoading = ref(false);

                const fetchMyFiles = async () => {
                    try {
                        const res = await axios.get(`${API_BASE}/kb/files`);
                        myFiles.value = res.data.data || [];
                    } catch (e) {
                        if (e.response?.status === 401) window.location.href = '/html/login.html';
                    }
                };

                const fetchSharedFiles = async () => {
                    try {
                        const res = await axios.get(`${API_BASE}/kb/shared`);
                        sharedFiles.value = res.data.data || [];
                    } catch (e) { console.error('获取共享文件列表失败', e); }
                };

                const ALLOWED_EXTS = ['.txt', '.pdf', '.docx', '.doc', '.pptx', '.xlsx'];

                const handleFileSelect = (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const ext = file.name.substring(file.name.lastIndexOf('.')).toLowerCase();
                        if (!ALLOWED_EXTS.includes(ext)) { alert('仅支持 ' + ALLOWED_EXTS.join(' / ') + ' 格式'); return; }
                        selectedFile.value = file;
                        uploadResult.value = null;
                    }
                };

                const handleFileDrop = (e) => {
                    const file = e.dataTransfer.files[0];
                    if (file) {
                        const ext = file.name.substring(file.name.lastIndexOf('.')).toLowerCase();
                        if (!ALLOWED_EXTS.includes(ext)) { alert('仅支持 ' + ALLOWED_EXTS.join(' / ') + ' 格式'); return; }
                        selectedFile.value = file;
                        uploadResult.value = null;
                    }
                };

                const handleUpload = async () => {
                    if (!selectedFile.value) return;
                    uploading.value = true;
                    uploadResult.value = null;
                    try {
                        const formData = new FormData();
                        formData.append('file', selectedFile.value);
                        formData.append('is_shared', uploadShared.value ? 'true' : 'false');
                        const res = await axios.post(`${API_BASE}/kb/upload`, formData, { headers: { 'Content-Type': 'multipart/form-data' } });
                        uploadResult.value = { isSuccess: true, message: res.data.message || '上传成功' };
                        selectedFile.value = null;
                        uploadShared.value = false;
                        fetchMyFiles();
                        fetchSharedFiles();
                    } catch (e) {
                        uploadResult.value = { isSuccess: false, message: e.response?.data?.detail || '上传失败' };
                    } finally { uploading.value = false; }
                };

                const handleToggleShare = async (fileId) => {
                    try {
                        const res = await axios.post(`${API_BASE}/kb/files/${fileId}/share`);
                        const file = myFiles.value.find(f => f.id === fileId);
                        if (file) file.is_shared = res.data.data.is_shared;
                        fetchSharedFiles();
                    } catch (e) { alert(e.response?.data?.detail || '操作失败'); }
                };

                const handleDeleteFile = async (fileId) => {
                    if (!confirm('确定要删除这个文件吗？')) return;
                    try {
                        await axios.delete(`${API_BASE}/kb/files/${fileId}`);
                        myFiles.value = myFiles.value.filter(f => f.id !== fileId);
                        fetchSharedFiles();
                    } catch (e) { alert(e.response?.data?.detail || '删除失败'); }
                };

                const handlePreview = async (file) => {
                    showPreview.value = true;
                    previewLoading.value = true;
                    previewFile.value = { filename: file.filename, content: '', total_chars: 0 };
                    try {
                        const res = await axios.get(`${API_BASE}/kb/files/${file.id}/preview`);
                        previewFile.value = res.data.data;
                    } catch (e) {
                        previewFile.value.content = '加载失败: ' + (e.response?.data?.detail || '未知错误');
                    } finally { previewLoading.value = false; }
                };

                onMounted(async () => {
                    try {
                        await axios.get(`${API_BASE}/auth/me`);
                    } catch (e) {
                        window.location.href = '/html/login.html';
                        return;
                    }
                    username.value = localStorage.getItem('username') || '用户';
                    fetchMyFiles();
                    fetchSharedFiles();
                });

                return {
                    kbTab, username, myFiles, sharedFiles,
                    selectedFile, uploadShared, uploading, uploadResult,
                    showPreview, previewFile, previewLoading,
                    handleFileSelect, handleFileDrop, handleUpload,
                    handleToggleShare, handleDeleteFile, handlePreview
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
